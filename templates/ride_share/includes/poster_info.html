{% comment %}Usage: include with `user` and optional `created_at`{% endcomment %}
<div class="poster-info">
  {% if user.profile.photo %}
    <img src="{{ user.profile.photo.file.url }}" alt="{{ user.get_full_name }}" class="poster-avatar">
  {% else %}
    <div class="poster-avatar-placeholder">{{ user.first_name|first }}</div>
  {% endif %}
  <div class="poster-details">
    <h5>{{ user.get_full_name }}</h5>
    {% if created_at %}
      <small class="text-muted">{{ created_at|timesince }} ago</small>
    {% endif %}
  </div>
</div>
